  <rect x="40" y="340" width="520" height="42" rx="14" fill="#0f172a" stroke="#818cf8" stroke-width="1.5"/>
  <text x="60" y="366" font-family="system-ui, sans-serif" font-weight="800" font-size="14" fill="#818cf8">Task #1: Evaluating Old Market &amp; Pub Street Area Foot Traffic</text>
