      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg_sr1)"/>

  <rect x="60" y="60" width="480" height="250" rx="24" fill="#ffffff" opacity="0.95"/>
