    <text x="90" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="900" font-size="32" fill="#dc2626">2.0 / 5.0</text>
    <text x="90" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="10" fill="#ef4444">Excessively High Rent Premium</text>
