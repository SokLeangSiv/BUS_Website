  <g transform="translate(100, 130)">
    <rect x="0" y="0" width="180" height="130" rx="16" fill="#e0e7ff"/>
    <text x="90" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="13" fill="#3730a3">TOURIST FOOT TRAFFIC</text>
    <text x="90" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="900" font-size="32" fill="#4338ca">5.0 / 5.0</text>
