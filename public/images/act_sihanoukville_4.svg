<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg_shv4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg_shv4)"/>

  <!-- Cold Chain Refrigeration Van & Sensor Control Graphics -->
  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="440" height="230" rx="24" fill="#ffffff" opacity="0.95"/>
    <text x="220" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="900" font-size="18" fill="#0369a1">COLD-CHAIN DISPATCH STANDARDS</text>

    <!-- Refrigerated Van Icon -->
    <rect x="40" y="70" width="160" height="90" rx="12" fill="#0284c7"/>
    <rect x="160" y="90" width="40" height="70" rx="8" fill="#0369a1"/>
    <circle cx="80" cy="160" r="16" fill="#0f172a"/>
    <circle cx="170" cy="160" r="16" fill="#0f172a"/>
    <text x="120" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="12" fill="#ffffff">COLD VAN</text>

    <!-- Temperature Sensor Display -->
    <g transform="translate(240, 70)">
      <rect x="0" y="0" width="160" height="90" rx="14" fill="#0f172a"/>
      <text x="80" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="11" fill="#38bdf8">TARGET TEMP</text>
      <text x="80" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="900" font-size="28" fill="#22c55e">+4.0°C</text>
      <text x="80" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="9" fill="#94a3b8">100% Safety Guarantee</text>
    </g>
  </g>

  <!-- Bottom Title -->
  <rect x="40" y="340" width="520" height="42" rx="14" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="60" y="366" font-family="system-ui, sans-serif" font-weight="800" font-size="14" fill="#38bdf8">Task #4: Live Tasting &amp; Temperature-Controlled Dispatch Standards</text>
</svg>
