  <text x="120" y="76" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#0284c7" letter-spacing="2">SINGAPORE</text>
  <text x="120" y="94" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#64748b">Convention &amp; Exhibition Centre</text>
