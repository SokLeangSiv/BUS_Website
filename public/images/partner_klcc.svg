<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <rect width="400" height="120" rx="16" fill="#ffffff"/>
  <!-- Twin Towers Silhouette -->
  <g transform="translate(35, 15)">
    <!-- Left Tower -->
    <rect x="15" y="20" width="16" height="70" rx="2" fill="#0f766e"/>
    <polygon points="23,5 15,20 31,20" fill="#0d9488"/>
    <!-- Right Tower -->
    <rect x="45" y="20" width="16" height="70" rx="2" fill="#0f766e"/>
    <polygon points="53,5 45,20 61,20" fill="#0d9488"/>
    <!-- Skybridge -->
    <rect x="31" y="45" width="14" height="6" fill="#14b8a6"/>
  </g>
  <!-- Text -->
  <text x="120" y="52" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="28" fill="#0f172a" letter-spacing="-0.5">KLCC</text>
  <text x="120" y="76" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="15" fill="#0d9488" letter-spacing="1">MALAYSIA CONVENTION</text>
  <text x="120" y="94" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#64748b">Kuala Lumpur Convention Centre</text>
</svg>
